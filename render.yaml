services:
  - type: web
    name: sandbox-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: sandbox-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sandbox-backend-tkn2.onrender.com

  # AI gateway (LiteLLM proxy) — own deps, own secrets, own lifecycle.
  # Secrets use `sync: false`: declared here so the service's required env is
  # documented, but their VALUES are set in the dashboard/API, never in git.
  - type: web
    name: litellm-gateway
    runtime: python
    plan: free
    rootDir: gateway
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: LITELLM_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
