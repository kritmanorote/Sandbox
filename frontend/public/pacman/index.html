<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacman</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
canvas { display: block; max-width: 100vw; max-height: 100vh; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const SCREEN_W = 800, SCREEN_H = 500, HUD_HEIGHT = 60;
const MAZE_H = SCREEN_H - HUD_HEIGHT;
const TILE = 20;
const COLS = SCREEN_W / TILE;   // 40
const ROWS = MAZE_H / TILE;     // 22
const FPS = 60;
const PACMAN_SPEED = 2;
const GHOST_SPEED = 1;
const FRIGHTEN_TICKS = 7 * FPS;
const WALL = 0, DOT = 1, PELLET = 2, EMPTY = 3;

const C = {
    black: '#000', blue: '#2121ff', lblue: '#6464ff',
    yellow: '#ffff00', white: '#fff', red: '#ff0000',
    pink: '#ffb8ff', cyan: '#00ffff', orange: '#ffb851',
    scared: '#0000c8', dotc: '#ffb9af', dgray: '#282828',
};

// ── Maze ──────────────────────────────────────────────────────────────────────

function makeMaze() {
    const rows = [];
    for (let r = 0; r < ROWS; r++) {
        if (r === 0 || r === ROWS - 1) { rows.push(Array(COLS).fill('#')); continue; }
        rows.push(Array.from({length: COLS}, (_, c) => (c === 0 || c === COLS - 1) ? '#' : '.'));
    }
    const wr = (r1, c1, r2, c2) => {
        for (let r = r1; r <= r2; r++)
            for (let c = c1; c <= c2; c++)
                if (r >= 0 && r < ROWS && c >= 0 && c < COLS) rows[r][c] = '#';
    };
    wr(2,2,4,4);   wr(2,6,4,11);  wr(2,13,4,17); wr(2,19,4,20);
    wr(2,22,4,26); wr(2,28,4,33); wr(2,35,4,37);
    wr(6,2,7,4);   wr(6,6,7,8);   wr(6,10,7,14); wr(6,16,7,23);
    wr(6,25,7,29); wr(6,31,7,33); wr(6,35,7,37);
    wr(9,0,17,4);  wr(9,35,17,39);
    wr(9,6,10,14); wr(9,25,10,33);
    wr(11,16,14,23);
    for (let r = 12; r < 14; r++) for (let c = 17; c < 23; c++) rows[r][c] = ' ';
    for (let c = 18; c < 22; c++) rows[11][c] = ' ';
    wr(17,2,18,4);  wr(17,6,18,11);  wr(17,13,18,17);
    wr(17,22,18,26); wr(17,28,18,33); wr(17,35,18,37);
    rows[1][1] = 'o'; rows[1][COLS-2] = 'o';
    rows[ROWS-2][1] = 'o'; rows[ROWS-2][COLS-2] = 'o';
    return rows.map(r => r.join(''));
}

const MAZE_TEMPLATE = makeMaze();

function buildMaze(tpl) {
    const grid = []; let dots = 0;
    for (const s of tpl) {
        const row = [];
        for (const ch of s) {
            if (ch === '#') row.push(WALL);
            else if (ch === 'o') { row.push(PELLET); dots++; }
            else if (ch === '.') { row.push(DOT); dots++; }
            else row.push(EMPTY);
        }
        grid.push(row);
    }
    return { grid, dots };
}

function drawTile(ctx, r, c, tile) {
    const x = c * TILE, y = r * TILE;
    ctx.fillStyle = C.black;
    ctx.fillRect(x, y, TILE, TILE);
    if (tile === WALL) {
        ctx.fillStyle = C.blue;
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = C.lblue;
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
    } else if (tile === DOT) {
        ctx.fillStyle = C.dotc;
        ctx.beginPath(); ctx.arc(x + TILE/2, y + TILE/2, 2, 0, Math.PI*2); ctx.fill();
    } else if (tile === PELLET) {
        ctx.fillStyle = C.white;
        ctx.beginPath(); ctx.arc(x + TILE/2, y + TILE/2, 5, 0, Math.PI*2); ctx.fill();
    }
}

// ── Pacman ────────────────────────────────────────────────────────────────────

class Pacman {
    constructor() { this.reset(); }

    reset() {
        this.col = Math.floor(COLS / 2);
        this.row = ROWS - 4;
        this.px = this.col * TILE + TILE / 2;
        this.py = this.row * TILE + TILE / 2;
        this.dir = [0, 0]; this.nextDir = [1, 0];
        this.mouthAngle = 30; this.mouthDir = 1;
        this.radius = TILE / 2 - 2;
    }

    handleKey(key) {
        if (key === 'ArrowLeft')  this.nextDir = [-1, 0];
        if (key === 'ArrowRight') this.nextDir = [1, 0];
        if (key === 'ArrowUp')    this.nextDir = [0, -1];
        if (key === 'ArrowDown')  this.nextDir = [0, 1];
    }

    update(maze) {
        const cx = this.col * TILE + TILE / 2;
        const cy = this.row * TILE + TILE / 2;
        if (Math.abs(this.px - cx) <= PACMAN_SPEED && Math.abs(this.py - cy) <= PACMAN_SPEED) {
            const [ndc, ndr] = this.nextDir;
            const nc = this.col + ndc, nr = this.row + ndr;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && maze[nr][nc] !== WALL) {
                if (ndc !== this.dir[0] || ndr !== this.dir[1]) { this.px = cx; this.py = cy; }
                this.dir = [ndc, ndr];
            }
        }
        const [dc, dr] = this.dir;
        if (dc !== 0 || dr !== 0) {
            const npx = this.px + dc * PACMAN_SPEED, npy = this.py + dr * PACMAN_SPEED;
            const nc = Math.floor(npx / TILE), nr = Math.floor(npy / TILE);
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && maze[nr][nc] !== WALL) {
                this.px = npx; this.py = npy;
            } else {
                this.px = cx; this.py = cy;
            }
        }
        if (this.px < 0) this.px = SCREEN_W - 1;
        if (this.px >= SCREEN_W) this.px = 0;
        this.col = Math.max(0, Math.min(COLS - 1, Math.floor(this.px / TILE)));
        this.row = Math.max(0, Math.min(ROWS - 1, Math.floor(this.py / TILE)));
        this.mouthAngle += 3 * this.mouthDir;
        if (this.mouthAngle >= 45) this.mouthDir = -1;
        if (this.mouthAngle <= 0)  this.mouthDir = 1;
    }

    draw(ctx) {
        const ix = Math.round(this.px), iy = Math.round(this.py);
        ctx.fillStyle = C.yellow;
        ctx.beginPath(); ctx.arc(ix, iy, this.radius, 0, Math.PI * 2); ctx.fill();
        if (this.dir[0] !== 0 || this.dir[1] !== 0) {
            const angle = Math.atan2(this.dir[1], this.dir[0]);
            const half = (this.mouthAngle / 2) * Math.PI / 180;
            const r = this.radius + 1;
            ctx.fillStyle = C.black;
            ctx.beginPath();
            ctx.moveTo(ix, iy);
            ctx.lineTo(ix + r * Math.cos(angle - half), iy + r * Math.sin(angle - half));
            ctx.lineTo(ix + r * Math.cos(angle + half), iy + r * Math.sin(angle + half));
            ctx.closePath(); ctx.fill();
        }
    }
}

// ── Ghost ─────────────────────────────────────────────────────────────────────

const DIRS4 = [[0,-1],[0,1],[-1,0],[1,0]];

class Ghost {
    constructor(col, row, color, scatterTarget) {
        this.startCol = col; this.startRow = row;
        this.color = color; this.scatterTarget = scatterTarget;
        this.reset();
    }

    reset() {
        this.col = this.startCol; this.row = this.startRow;
        this.px = this.col * TILE + TILE / 2;
        this.py = this.row * TILE + TILE / 2;
        this.dir = [0, -1]; this.mode = 'scatter';
        this.frightenTimer = 0; this.radius = TILE / 2 - 2;
    }

    frighten() {
        if (this.mode !== 'eaten') { this.mode = 'frightened'; this.frightenTimer = FRIGHTEN_TICKS; }
    }

    isAligned() {
        const cx = this.col * TILE + TILE / 2, cy = this.row * TILE + TILE / 2;
        return Math.abs(this.px - cx) < GHOST_SPEED + 1 && Math.abs(this.py - cy) < GHOST_SPEED + 1;
    }

    chooseDir(maze, pacman) {
        const rev = [-this.dir[0], -this.dir[1]];
        if (this.mode === 'frightened') {
            const opts = DIRS4.filter(d =>
                !(d[0]===rev[0] && d[1]===rev[1]) &&
                this.row+d[1] >= 0 && this.row+d[1] < ROWS &&
                this.col+d[0] >= 0 && this.col+d[0] < COLS &&
                maze[this.row+d[1]][this.col+d[0]] !== WALL);
            if (opts.length) this.dir = opts[Math.floor(Math.random() * opts.length)];
            return;
        }
        let target;
        if (this.mode === 'eaten') target = [Math.floor(COLS/2), Math.floor(ROWS/2)];
        else if (this.mode === 'scatter') target = this.scatterTarget;
        else {
            target = [pacman.col, pacman.row];
            if (this.color === C.pink) {
                const [dc, dr] = pacman.dir;
                target = [pacman.col + 4*dc, pacman.row + 4*dr];
            }
        }
        let best = null, bestD = Infinity;
        for (const d of DIRS4) {
            if (d[0]===rev[0] && d[1]===rev[1]) continue;
            const nc = this.col+d[0], nr = this.row+d[1];
            if (nr<0||nr>=ROWS||nc<0||nc>=COLS||maze[nr][nc]===WALL) continue;
            const dist = (nc-target[0])**2 + (nr-target[1])**2;
            if (dist < bestD) { bestD = dist; best = d; }
        }
        if (best) this.dir = best;
    }

    update(maze, pacman) {
        if (this.mode === 'frightened' && --this.frightenTimer <= 0) this.mode = 'chase';
        if (this.mode === 'eaten') {
            const hx = Math.floor(COLS/2)*TILE+TILE/2, hy = Math.floor(ROWS/2)*TILE+TILE/2;
            if (Math.abs(this.px-hx) < TILE && Math.abs(this.py-hy) < TILE) this.mode = 'scatter';
        }
        const speed = this.mode === 'eaten' ? GHOST_SPEED * 2 : GHOST_SPEED;
        if (this.isAligned()) {
            const old = [...this.dir];
            this.chooseDir(maze, pacman);
            if (this.dir[0]!==old[0] || this.dir[1]!==old[1]) {
                this.px = this.col*TILE+TILE/2; this.py = this.row*TILE+TILE/2;
            }
        }
        const [dc, dr] = this.dir;
        const npx = this.px+dc*speed, npy = this.py+dr*speed;
        const nc = Math.floor(npx/TILE), nr = Math.floor(npy/TILE);
        if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&maze[nr][nc]!==WALL) {
            this.px = npx; this.py = npy;
        } else {
            this.px = this.col*TILE+TILE/2; this.py = this.row*TILE+TILE/2;
        }
        this.col = Math.max(0, Math.min(COLS-1, Math.floor(this.px/TILE)));
        this.row = Math.max(0, Math.min(ROWS-1, Math.floor(this.py/TILE)));
    }

    draw(ctx) {
        const ix = Math.round(this.px), iy = Math.round(this.py), r = this.radius;
        if (this.mode === 'eaten') {
            ctx.fillStyle = C.white;
            ctx.beginPath(); ctx.arc(ix-r/3, iy-r/4, r/4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(ix+r/3, iy-r/4, r/4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = C.cyan;
            ctx.beginPath(); ctx.arc(ix-r/3, iy-r/4, r/8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(ix+r/3, iy-r/4, r/8, 0, Math.PI*2); ctx.fill();
            return;
        }
        const flash = this.mode==='frightened' && this.frightenTimer < 2*FPS && Math.floor(this.frightenTimer/15)%2===0;
        const color = this.mode==='frightened' ? (flash ? C.white : C.scared) : this.color;
        ctx.fillStyle = color;
        ctx.fillRect(ix-r, iy, r*2, r);
        ctx.beginPath(); ctx.arc(ix, iy, r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = C.black;
        for (let i = 0; i < 3; i++) {
            const bx = ix - r + i * Math.floor(r*2/3) + Math.floor(r/3);
            ctx.beginPath(); ctx.arc(bx, iy+r, Math.floor(r/3), 0, Math.PI*2); ctx.fill();
        }
        if (this.mode !== 'frightened') {
            ctx.fillStyle = C.white;
            ctx.beginPath(); ctx.arc(ix-r/3, iy-r/4, r/4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(ix+r/3, iy-r/4, r/4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = C.blue;
            ctx.beginPath(); ctx.arc(ix-r/3, iy-r/4, r/8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(ix+r/3, iy-r/4, r/8, 0, Math.PI*2); ctx.fill();
        }
    }
}

// ── Game ──────────────────────────────────────────────────────────────────────

class Game {
    constructor() {
        this.canvas = document.getElementById('canvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = SCREEN_W;
        this.canvas.height = SCREEN_H;
        this.reset();
        document.addEventListener('keydown', e => {
            if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
            if (this.state === 'playing') this.pacman.handleKey(e.key);
            else if (e.key === ' ' && ['start','game_over','win'].includes(this.state)) {
                this.reset(); this.state = 'playing';
            }
        });
    }

    reset() {
        const { grid, dots } = buildMaze(MAZE_TEMPLATE);
        this.maze = grid; this.dotsRemaining = dots;
        this.score = 0; this.lives = 3; this.state = 'start';
        this.pacman = new Pacman();
        this.ghosts = [
            new Ghost(18, 12, C.red,    [COLS-1, 0]),
            new Ghost(21, 12, C.pink,   [0, 0]),
            new Ghost(18, 13, C.cyan,   [COLS-1, ROWS-1]),
            new Ghost(21, 13, C.orange, [0, ROWS-1]),
        ];
        this.globalMode = 'scatter'; this.modeTimer = 7 * FPS;
        this.dyingTimer = 0; this.eatenStreak = 0;
        this.buildBg();
    }

    buildBg() {
        this.bg = document.createElement('canvas');
        this.bg.width = SCREEN_W; this.bg.height = SCREEN_H;
        this.bgCtx = this.bg.getContext('2d');
        this.bgCtx.fillStyle = C.black;
        this.bgCtx.fillRect(0, 0, SCREEN_W, SCREEN_H);
        for (let r = 0; r < ROWS; r++)
            for (let c = 0; c < COLS; c++)
                drawTile(this.bgCtx, r, c, this.maze[r][c]);
        this.bgCtx.strokeStyle = C.blue;
        this.bgCtx.lineWidth = 2;
        this.bgCtx.beginPath();
        this.bgCtx.moveTo(0, MAZE_H); this.bgCtx.lineTo(SCREEN_W, MAZE_H);
        this.bgCtx.stroke();
    }

    resetPositions() {
        this.pacman.reset();
        for (const g of this.ghosts) g.reset();
    }

    checkDots() {
        const r = this.pacman.row, c = this.pacman.col;
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
        const tile = this.maze[r][c];
        if (tile === DOT || tile === PELLET) {
            this.maze[r][c] = EMPTY;
            drawTile(this.bgCtx, r, c, EMPTY);
            this.score += tile === DOT ? 10 : 50;
            this.dotsRemaining--;
            if (tile === PELLET) {
                this.eatenStreak = 0;
                for (const g of this.ghosts) g.frighten();
            }
        }
    }

    checkGhosts() {
        for (const g of this.ghosts) {
            if (Math.hypot(g.px - this.pacman.px, g.py - this.pacman.py) < this.pacman.radius + g.radius - 2) {
                if (g.mode === 'frightened') {
                    g.mode = 'eaten';
                    this.eatenStreak++;
                    this.score += 200 * (1 << (this.eatenStreak - 1));
                } else if (g.mode !== 'eaten') {
                    this.lives--;
                    this.dyingTimer = Math.floor(1.5 * FPS);
                    this.state = 'dying';
                    return;
                }
            }
        }
    }

    updateGlobalMode() {
        if (--this.modeTimer <= 0) {
            this.globalMode = this.globalMode === 'scatter' ? 'chase' : 'scatter';
            this.modeTimer = this.globalMode === 'chase' ? 20 * FPS : 7 * FPS;
            for (const g of this.ghosts)
                if (g.mode !== 'frightened' && g.mode !== 'eaten') g.mode = this.globalMode;
        }
    }

    drawHUD() {
        const ctx = this.ctx;
        ctx.fillStyle = C.dgray;
        ctx.fillRect(0, MAZE_H, SCREEN_W, HUD_HEIGHT);
        ctx.textBaseline = 'middle';
        ctx.font = '16px monospace';
        ctx.fillStyle = C.white; ctx.textAlign = 'left';
        ctx.fillText(`SCORE  ${String(this.score).padStart(6)}`, 10, MAZE_H + 22);
        ctx.fillStyle = C.yellow; ctx.textAlign = 'center';
        ctx.fillText('PACMAN', SCREEN_W / 2, MAZE_H + 22);
        for (let i = 0; i < this.lives; i++) {
            const cx = SCREEN_W - 20 - i * 26, cy = MAZE_H + 30;
            ctx.fillStyle = C.yellow;
            ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = C.black;
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx+10, cy-5); ctx.lineTo(cx+10, cy+5);
            ctx.closePath(); ctx.fill();
        }
    }

    drawOverlay(lines) {
        const ctx = this.ctx;
        const panelH = 30 + lines.length * 62;
        ctx.fillStyle = 'rgba(0,0,0,0.78)';
        ctx.fillRect(SCREEN_W/2 - 190, 148, 380, panelH);
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        for (let i = 0; i < lines.length; i++) {
            const [text, color, big] = lines[i];
            ctx.fillStyle = color;
            ctx.font = big ? 'bold 42px monospace' : '16px monospace';
            ctx.fillText(text, SCREEN_W/2, 195 + i * 62);
        }
    }

    update() {
        if (this.state === 'playing') {
            this.pacman.update(this.maze);
            this.updateGlobalMode();
            for (const g of this.ghosts) g.update(this.maze, this.pacman);
            this.checkDots();
            this.checkGhosts();
            if (this.dotsRemaining <= 0) this.state = 'win';
        } else if (this.state === 'dying') {
            if (--this.dyingTimer <= 0) {
                if (this.lives <= 0) this.state = 'game_over';
                else { this.resetPositions(); this.state = 'playing'; }
            }
        }
    }

    draw() {
        const ctx = this.ctx;
        ctx.drawImage(this.bg, 0, 0);
        if (this.state !== 'dying' || Math.floor(this.dyingTimer / 8) % 2 === 0)
            this.pacman.draw(ctx);
        for (const g of this.ghosts) g.draw(ctx);
        this.drawHUD();
        if (this.state === 'start')
            this.drawOverlay([['PACMAN', C.yellow, true], ['Press SPACE to start', C.white, false]]);
        else if (this.state === 'game_over')
            this.drawOverlay([['GAME OVER', C.red, true], [`Score: ${this.score}`, C.white, false], ['Press SPACE to retry', C.white, false]]);
        else if (this.state === 'win')
            this.drawOverlay([['YOU WIN!', C.yellow, true], [`Score: ${this.score}`, C.white, false], ['Press SPACE to play again', C.white, false]]);
    }

    run() {
        let last = 0;
        const step = ts => {
            if (ts - last >= 1000 / FPS) { last = ts; this.update(); this.draw(); }
            requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    }
}

new Game().run();
</script>
</body>
</html>
