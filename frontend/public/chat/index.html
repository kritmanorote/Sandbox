<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neon Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a1a;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    max-width: 760px;
    padding: 18px 20px 14px;
    border-bottom: 1px solid #1a1a3a;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 {
    font-size: 1.3rem;
    color: #00ffff;
    text-shadow: 0 0 8px #00ffff88;
    letter-spacing: 2px;
  }

  header a {
    color: #888;
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 1px;
  }

  header a:hover { color: #00ffff; }

  .header-btn {
    background: transparent;
    border: 1px solid #444;
    color: #888;
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    white-space: nowrap;
  }

  #mode-toggle { margin-left: auto; }

  #mode-toggle.restricted {
    border-color: #a855f7;
    color: #a855f7;
    box-shadow: 0 0 8px #a855f733;
  }

  #agent-toggle.active {
    border-color: #00ffff;
    color: #00ffff;
    box-shadow: 0 0 8px #00ffff33;
  }

  /* Tool call pill */
  .tool-call {
    align-self: flex-start;
    max-width: 80%;
    font-size: 0.75rem;
    color: #00ffff;
    border: 1px solid #00ffff44;
    border-radius: 8px;
  }

  .tool-toggle {
    padding: 5px 12px;
    cursor: pointer;
    user-select: none;
    letter-spacing: 1px;
  }

  .tool-toggle::before { content: '▶ '; font-size: 0.6rem; }
  .tool-toggle.open::before { content: '▼ '; }

  .tool-chunks {
    display: none;
    padding: 6px 12px 8px;
    flex-direction: column;
    gap: 6px;
    border-top: 1px solid #00ffff22;
  }

  .tool-chunks.open { display: flex; }

  .tool-chunk {
    background: #0a1a1a;
    border-left: 2px solid #00ffff;
    padding: 4px 8px;
    color: #a0e8e8;
    border-radius: 0 4px 4px 0;
    white-space: pre-wrap;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    width: 100%;
    max-width: 760px;
    padding: 20px 20px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .msg {
    max-width: 80%;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 0.92rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: #1a1a3a;
    border: 1px solid #00ffff44;
    color: #e0e0e0;
  }

  .msg.assistant {
    align-self: flex-start;
    background: #0f1420;
    border: 1px solid #c026d344;
    color: #d8d8f0;
  }

  .msg.assistant .name { color: #c026d3; font-size: 0.75rem; margin-bottom: 4px; letter-spacing: 1px; }
  .msg.user .name { display: none; }

  .msg.thinking {
    align-self: flex-start;
    background: transparent;
    border: none;
    color: #444;
    font-size: 0.8rem;
    padding: 4px 0;
    animation: blink 1s step-start infinite;
  }

  /* RAG context pill */
  .rag-context {
    align-self: flex-start;
    max-width: 80%;
    font-size: 0.75rem;
    color: #a855f7;
    border: 1px solid #a855f744;
    border-radius: 8px;
  }

  .rag-toggle {
    padding: 5px 12px;
    cursor: pointer;
    user-select: none;
    letter-spacing: 1px;
  }

  .rag-toggle::before { content: '▶ '; font-size: 0.6rem; }
  .rag-toggle.open::before { content: '▼ '; }

  .rag-chunks {
    display: none;
    padding: 6px 12px 8px;
    flex-direction: column;
    gap: 6px;
    border-top: 1px solid #a855f722;
  }

  .rag-chunks.open { display: flex; }

  .rag-chunk {
    background: #1a0a2a;
    border-left: 2px solid #a855f7;
    padding: 4px 8px;
    color: #c4a0e8;
    border-radius: 0 4px 4px 0;
    white-space: pre-wrap;
  }

  .vec-section {
    margin-top: 6px;
    font-size: 0.68rem;
    color: #7c3aed;
  }

  .vec-preview {
    font-family: 'Courier New', monospace;
    color: #9f7aea;
    margin: 2px 0;
  }

  .sparkline {
    display: flex;
    align-items: flex-end;
    gap: 1px;
    height: 24px;
    margin-top: 4px;
  }

  .spark-bar {
    width: 3px;
    border-radius: 1px 1px 0 0;
  }

  @keyframes blink { 50% { opacity: 0; } }

  #input-row {
    width: 100%;
    max-width: 760px;
    padding: 12px 20px 20px;
    display: flex;
    gap: 10px;
  }

  #user-input {
    flex: 1;
    background: #0f1420;
    border: 1px solid #00ffff55;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 0.92rem;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    resize: none;
    line-height: 1.5;
    max-height: 120px;
    transition: border-color 0.2s;
  }

  #user-input:focus { border-color: #00ffff; }
  #user-input::placeholder { color: #444; }

  #send-btn {
    background: #00ffff22;
    border: 1px solid #00ffff88;
    color: #00ffff;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s, box-shadow 0.2s;
    align-self: flex-end;
    white-space: nowrap;
  }

  #send-btn:hover { background: #00ffff44; box-shadow: 0 0 10px #00ffff55; }
  #send-btn:disabled { opacity: 0.4; cursor: default; }

  #error-banner {
    display: none;
    width: 100%;
    max-width: 760px;
    padding: 8px 20px;
    background: #2a0a0a;
    border-top: 1px solid #ff004488;
    color: #ff6677;
    font-size: 0.8rem;
  }
</style>
</head>
<body>

<header>
  <h1>// NEON CHAT</h1>
  <button id="agent-toggle" class="header-btn">AGENT OFF</button>
  <button id="mode-toggle" class="header-btn">FREE MODE</button>
  <a href="/">← Back</a>
</header>

<div id="messages"></div>
<div id="error-banner"></div>

<div id="input-row">
  <textarea id="user-input" rows="1" placeholder="Ask anything..." maxlength="4000"></textarea>
  <button id="send-btn">SEND</button>
</div>

<script>
  // ─── Retrieval (vectors stored in DB, search via /search endpoint) ──────────
  async function retrieve(query) {
    const res = await fetch(`${API_URL}/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, top_k: 2, threshold: 0.5 }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();
    return data.results.map(r => ({ ...r, queryVec: data.query_vector }));
  }

  // ─── UI helpers ────────────────────────────────────────────────────────────
  const params = new URLSearchParams(location.search);
  const API_URL = params.get('api') || 'http://localhost:8000';

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const errorBanner = document.getElementById('error-banner');
  const modeToggle = document.getElementById('mode-toggle');
  const agentToggle = document.getElementById('agent-toggle');

  const SYSTEM_INSTRUCTION = 'Answer ONLY using the provided context. If the answer is not in the context, say "I don\'t have that information in my knowledge base."';

  let restricted = false;
  let useAgent = false;

  modeToggle.addEventListener('click', () => {
    restricted = !restricted;
    modeToggle.textContent = restricted ? 'RAG ONLY' : 'FREE MODE';
    modeToggle.classList.toggle('restricted', restricted);
  });

  agentToggle.addEventListener('click', () => {
    useAgent = !useAgent;
    agentToggle.textContent = useAgent ? 'AGENT ON' : 'AGENT OFF';
    agentToggle.classList.toggle('active', useAgent);
  });

  const history = [];

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.style.display = 'block';
    setTimeout(() => { errorBanner.style.display = 'none'; }, 5000);
  }

  function makeSparkline(vec) {
    // Sample 48 evenly-spaced values from the full vector
    const n = 48;
    const step = Math.floor(vec.length / n);
    const samples = Array.from({ length: n }, (_, i) => vec[i * step]);
    const max = Math.max(...samples.map(Math.abs));
    const el = document.createElement('div');
    el.className = 'sparkline';
    samples.forEach(v => {
      const bar = document.createElement('div');
      bar.className = 'spark-bar';
      const pct = Math.max(2, Math.round((Math.abs(v) / max) * 24));
      bar.style.height = pct + 'px';
      bar.style.background = v >= 0 ? '#a855f7' : '#ec4899';
      el.appendChild(bar);
    });
    return el;
  }

  function appendRagContext(results) {
    const wrapper = document.createElement('div');
    wrapper.className = 'rag-context';

    const toggle = document.createElement('div');
    toggle.className = 'rag-toggle';
    toggle.textContent = `RAG: ${results.length} chunk${results.length > 1 ? 's' : ''} retrieved`;

    const chunkList = document.createElement('div');
    chunkList.className = 'rag-chunks';
    results.forEach(({ chunk, score, vector, queryVec }) => {
      const div = document.createElement('div');
      div.className = 'rag-chunk';

      const scoreTag = document.createElement('span');
      scoreTag.style.cssText = 'color:#7c3aed;margin-right:8px;font-size:0.7rem;';
      scoreTag.textContent = `[${score.toFixed(3)}]`;
      div.appendChild(scoreTag);
      div.appendChild(document.createTextNode(chunk));

      // Vector section
      const vecSection = document.createElement('div');
      vecSection.className = 'vec-section';

      const dim = document.createElement('div');
      dim.textContent = `chunk vector — ${vector.length} dims`;
      vecSection.appendChild(dim);

      const preview = document.createElement('div');
      preview.className = 'vec-preview';
      preview.textContent = '[' + vector.slice(0, 6).map(v => v.toFixed(4)).join(', ') + ', ...]';
      vecSection.appendChild(preview);
      vecSection.appendChild(makeSparkline(vector));

      const qdim = document.createElement('div');
      qdim.style.marginTop = '6px';
      qdim.textContent = `query vector — ${queryVec.length} dims`;
      vecSection.appendChild(qdim);

      const qpreview = document.createElement('div');
      qpreview.className = 'vec-preview';
      qpreview.textContent = '[' + queryVec.slice(0, 6).map(v => v.toFixed(4)).join(', ') + ', ...]';
      vecSection.appendChild(qpreview);
      vecSection.appendChild(makeSparkline(queryVec));

      div.appendChild(vecSection);
      chunkList.appendChild(div);
    });

    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      chunkList.classList.toggle('open');
    });

    wrapper.appendChild(toggle);
    wrapper.appendChild(chunkList);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendToolCalls(toolCalls) {
    toolCalls.forEach(tc => {
      const wrapper = document.createElement('div');
      wrapper.className = 'tool-call';

      const toggle = document.createElement('div');
      toggle.className = 'tool-toggle';
      toggle.textContent = `AGENT called: search_knowledge_base("${tc.query}")`;

      const chunkList = document.createElement('div');
      chunkList.className = 'tool-chunks';
      tc.results.forEach(chunk => {
        const div = document.createElement('div');
        div.className = 'tool-chunk';
        div.textContent = chunk;
        chunkList.appendChild(div);
      });

      toggle.addEventListener('click', () => {
        toggle.classList.toggle('open');
        chunkList.classList.toggle('open');
      });

      wrapper.appendChild(toggle);
      wrapper.appendChild(chunkList);
      messagesEl.appendChild(wrapper);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendMsg(role, content) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (role === 'assistant') {
      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = 'GEMINI';
      div.appendChild(name);
    }
    const text = document.createElement('div');
    text.textContent = content;
    div.appendChild(text);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function appendThinking() {
    const div = document.createElement('div');
    div.className = 'msg thinking';
    div.textContent = 'thinking...';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  // ─── Send ──────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMsg('user', text);
    const thinking = appendThinking();

    try {
      let augmented = text;

      if (useAgent) {
        // Agent mode: send directly — Gemini decides when to call search
        history.push({ role: 'user', content: text });
      } else {
        // Manual RAG mode: frontend retrieves context and injects it
        const results = await retrieve(text);
        if (results.length > 0) {
          augmented = `[Context from knowledge base:\n${results.map((r, i) => `${i + 1}. ${r.chunk}`).join('\n')}]\n\nUser question: ${text}`;
          appendRagContext(results);
        }
        history.push({ role: 'user', content: augmented });
      }

      const res = await fetch(`${API_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: history,
          system_instruction: restricted ? SYSTEM_INSTRUCTION : '',
          use_agent: useAgent,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const reply = data.reply;
      history.push({ role: 'model', content: reply });
      thinking.remove();
      if (data.tool_calls?.length) appendToolCalls(data.tool_calls);
      appendMsg('assistant', reply);
    } catch (e) {
      thinking.remove();
      showError(`Error: ${e.message}`);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

</script>
</body>
</html>
